{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Scan History</h2>
<div class="table-responsive">
    <table class="table table-dark table-hover border-secondary align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Target</th>
                <th>Date</th>
                <th>Status</th>
                <th>Ports</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for scan in scans %}
            <tr>
                <td>{{ scan.id }}</td>
                <td>{{ scan.target_info.target }}</td>
                <td>{{ scan.scan_time.strftime('%Y-%m-%d %H:%M') }}</td>
                <td>
                    <span class="badge {% if scan.status == 'Completed' %}bg-success{% elif scan.status == 'Running' %}bg-warning text-dark{% else %}bg-danger{% endif %}">
                        {{ scan.status }}
                    </span>
                </td>
                <td>{{ scan.total_open_ports }}</td>
                <td>
                    <a href="/scan/{{ scan.id }}" class="btn btn-sm btn-outline-info">View Details</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
