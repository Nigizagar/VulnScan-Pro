{% extends 'base.html' %}
{% block content %}
<div class="card bg-dark border-secondary max-w-500 mx-auto" style="max-width: 600px;">
    <div class="card-header border-secondary"><i class="bi bi-crosshair"></i> Start New Scan</div>
    <div class="card-body">
        <form method="POST" action="/scan">
            <div class="mb-3">
                <label class="form-label">Target (IP or Domain)</label>
                <input type="text" class="form-control bg-dark text-light border-secondary" name="target" placeholder="e.g. 192.168.1.1 or example.com" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Start Port</label>
                    <input type="number" class="form-control bg-dark text-light border-secondary" name="start_port" value="1" min="1" max="65535">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">End Port</label>
                    <input type="number" class="form-control bg-dark text-light border-secondary" name="end_port" value="1024" min="1" max="65535">
                </div>
            </div>
            <button type="submit" class="btn btn-danger w-100"><i class="bi bi-play-fill"></i> Launch Scan</button>
        </form>
    </div>
</div>
{% endblock %}
